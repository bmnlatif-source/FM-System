# Netlify build configuration — Felix iQ ERP
# Connect this repo in the Netlify dashboard; everything below is picked up
# automatically. Every push to the deployed branch redeploys the site.

[build]
  command = "npm run build"
  publish = "dist"

# Single-page app: serve index.html for every path.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
